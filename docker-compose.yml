services:
  auth-app:
    container_name: auth-app
    build:
      context: .
      target: runner
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_URL: postgres://${POSTGRES_USER:-auth}:${POSTGRES_PASSWORD:-auth}@auth-db:5432/${POSTGRES_DB:-auth}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-168h}
      SMTP_HOST: mailpit
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@auth.local}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      auth-db:
        condition: service_healthy
      cache:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - learnquest

  auth-dev:
    build:
      context: .
      target: builder
    working_dir: /app
    volumes:
      - .:/app
      - gomodcache:/go/pkg/mod
    environment:
      DB_URL: postgres://${POSTGRES_USER:-auth}:${POSTGRES_PASSWORD:-auth}@auth-db:5432/${POSTGRES_DB:-auth}?sslmode=disable
      REDIS_URL: redis://cache:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-168h}
      SMTP_HOST: mailpit
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@auth.local}
      DEBUG: ${DEBUG:-false}
    depends_on:
      auth-db:
        condition: service_healthy
      cache:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - learnquest

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-auth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auth}
      POSTGRES_DB: ${POSTGRES_DB:-auth}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - learnquest

  cache:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - learnquest

  mailpit:
    image: axllent/mailpit
    ports:
      - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - learnquest

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - learnquest

volumes:
  pgdata:
  gomodcache:
  pgadmin_data:

networks:
  learnquest:
    external: true
